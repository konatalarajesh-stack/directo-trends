name: scrape-trends

on:
  schedule:
    # Every 6 hours at :05 to avoid the top-of-hour traffic spike.
    - cron: "5 */6 * * *"
  workflow_dispatch:  # manual trigger from Actions UI
  push:
    branches: [main]
    paths:
      - "scrapers/**"
      - "niches/**"
      - "normalize.py"
      - "requirements.txt"
      - ".github/workflows/scrape.yml"

permissions:
  contents: write  # needed to commit the public/ output back to main

concurrency:
  group: scrape-trends
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scrapers + normalize
        run: |
          python normalize.py --config niches/config.yaml --output public/
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit refreshed trends
        run: |
          git config user.name "directo-trends-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "trends: refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push

      - name: Notify on empty output (sanity check)
        if: failure()
        run: |
          echo "::error::Trend scrape failed or produced no output."
